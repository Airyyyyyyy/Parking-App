<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkFinder NG – Add Parking Lot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --navy: #0f2b3d; --accent: #ff8c42;
            --accent-grad: linear-gradient(95deg, #ff9a3c 0%, #ff6d2c 100%);
            --ink: #1e293b; --muted: #64748b; --line: #e6ecf3; --bg-soft: #f1f5fa;
        }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg-soft);
            color: var(--ink); line-height: 1.5; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }

        .navbar { background: #fff; border-bottom: 1px solid var(--line);
            box-shadow: 0 4px 14px rgba(15,43,61,.04); }
        .navbar .container { max-width: 1400px; margin: 0 auto; padding: 0 2rem;
            display: flex; align-items: center; justify-content: space-between; height: 70px; }
        .logo { font-size: 1.4rem; font-weight: 800; color: var(--navy);
            display: flex; align-items: center; gap: 10px; }
        .logo i { color: var(--accent); }
        .nav-link { color: #46586c; font-weight: 600; font-size: .9rem;
            padding: .5rem 1.2rem; border-radius: 40px; display: flex; align-items: center; gap: 8px; }
        .nav-link:hover { background: #f0f4f8; color: var(--navy); }

        .wrap { max-width: 620px; margin: 0 auto; padding: 2rem; }
        .page-head { margin-bottom: 1.4rem; }
        .page-head h1 { font-size: 1.5rem; font-weight: 800; color: var(--navy);
            display: flex; align-items: center; gap: 10px; }
        .page-head h1 i { color: var(--accent); }

        .card { background: #fff; border-radius: 24px; border: 1px solid var(--line);
            box-shadow: 0 4px 16px rgba(0,0,0,.02); padding: 2rem; }
        .field { margin-bottom: 1.2rem; }
        .field label { display: block; font-size: .78rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: .4px; color: var(--muted); margin-bottom: .4rem; }
        .field input { width: 100%; padding: .8rem 1rem; border-radius: 14px;
            border: 1px solid var(--line); font-family: inherit; font-size: .92rem; }
        .field input:focus { outline: none; border-color: var(--accent); }
        .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .hint { font-size: .74rem; color: var(--muted); margin-top: .3rem; }
        .error { background: #fee2e2; color: #b91c1c; padding: .8rem 1.1rem; border-radius: 14px;
            font-weight: 600; font-size: .88rem; margin-bottom: 1.2rem; }
        .actions { display: flex; gap: .8rem; margin-top: 1.6rem; }
        .btn-primary { background: var(--accent-grad); color: #fff; font-weight: 700;
            font-size: .9rem; padding: .85rem 1.5rem; border-radius: 14px; border: none; cursor: pointer;
            display: inline-flex; align-items: center; gap: 8px; }
        .btn-secondary { background: #f8fafc; color: var(--navy); border: 1px solid var(--line);
            font-weight: 700; font-size: .9rem; padding: .85rem 1.5rem; border-radius: 14px;
            display: inline-flex; align-items: center; gap: 8px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="container">
        <div class="logo"><i class="fas fa-square-parking"></i> ParkFinder NG <span style="font-size:.7rem;color:var(--accent);font-weight:700;">ADMIN</span></div>
        <a href="{% url 'manage_dashboard' %}" class="nav-link"><i class="fas fa-arrow-left"></i> Back to Manage</a>
    </div>
</nav>

<div class="wrap">
    <div class="page-head">
        <h1><i class="fas fa-plus"></i> Add Parking Lot</h1>
    </div>

    <div class="card">
        {% if error %}<div class="error">{{ error }}</div>{% endif %}
        <form method="post">
            {% csrf_token %}
            <div class="field">
                <label>Lot Name</label>
                <input type="text" name="name" value="{{ form.name|default:'' }}" placeholder="e.g. Library Car Park" required>
            </div>
            <div class="field">
                <label>Address</label>
                <input type="text" name="address" value="{{ form.address|default:'' }}" placeholder="e.g. Academic Block, Chrisland University" required>
            </div>
            <div class="field">
                <label>Total Slots</label>
                <input type="number" name="total_slots" min="1" value="{{ form.total_slots|default:'' }}" placeholder="e.g. 30" required>
                <p class="hint">Slots (S001, S002, …) are created automatically.</p>
            </div>
            <div class="row">
                <div class="field">
                    <label>Latitude <span style="text-transform:none;font-weight:500;">(optional)</span></label>
                    <input type="text" name="latitude" value="{{ form.latitude|default:'' }}" placeholder="6.9940">
                </div>
                <div class="field">
                    <label>Longitude <span style="text-transform:none;font-weight:500;">(optional)</span></label>
                    <input type="text" name="longitude" value="{{ form.longitude|default:'' }}" placeholder="3.2490">
                </div>
            </div>
            <div class="actions">
                <button type="submit" class="btn-primary"><i class="fas fa-check"></i> Create Lot</button>
                <a href="{% url 'manage_dashboard' %}" class="btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</div>

</body>
</html>
